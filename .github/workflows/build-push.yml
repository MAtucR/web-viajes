## ─────────────────────────────────────────────────────────────────────────────
## build-push.yml — Buildea, pushea y actualiza el manifest de k8s
##
## Flujo GitOps completo:
##   1. Build imagen app  → ghcr.io/matucr/web-viajes:sha-<short>  + :latest
##   2. Build imagen migrator → ghcr.io/matucr/web-viajes:migrate
##   3. Actualiza k8s/deployment.yaml con el nuevo sha tag
##   4. Commitea el manifest actualizado → ArgoCD detecta el cambio y redeploya solo
##
## De esta forma ArgoCD nunca necesita "force sync" ni imagePullPolicy tricks.
## ─────────────────────────────────────────────────────────────────────────────
name: Build & Push Docker Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'k8s/**'
      - 'argocd/**'
      - '*.md'
      - '.gitignore'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necesario para pushear el manifest actualizado
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name and short SHA
        run: |
          echo "IMAGE_NAME_LC=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "SHORT_SHA=$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runner
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:sha-${{ env.SHORT_SHA }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and push migrator image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: migrator
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:migrate
          cache-from: type=gha
          platforms: linux/amd64

      ## ── GitOps: actualizar el tag en k8s/deployment.yaml ──────────────────
      ## ArgoCD monitorea este archivo — al cambiar el tag detecta el nuevo
      ## deploy y sincroniza automáticamente sin intervención manual.
      - name: Update image tag in k8s/deployment.yaml
        run: |
          NEW_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:sha-${{ env.SHORT_SHA }}"
          # Reemplaza la línea de imagen del container app (no el initContainer migrate)
          sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:sha-.*|image: ${NEW_IMAGE}|g" k8s/deployment.yaml
          sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:latest|image: ${NEW_IMAGE}|g" k8s/deployment.yaml
          echo "Updated to: ${NEW_IMAGE}"
          grep "image:" k8s/deployment.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(deploy): bump app image to sha-${{ env.SHORT_SHA }} [skip ci]"
          git push
