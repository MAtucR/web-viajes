## ─────────────────────────────────────────────────────────────────────────────
## build-push.yml — Buildea y pushea la imagen a ghcr.io en cada push a main
##
## Imágenes resultantes:
##   ghcr.io/matucr/web-viajes:latest          ← app Next.js
##   ghcr.io/matucr/web-viajes:sha-<short>     ← app Next.js taggeada por commit
##   ghcr.io/matucr/web-viajes:migrate         ← imagen con prisma CLI para k8s initContainer
## ─────────────────────────────────────────────────────────────────────────────
name: Build & Push Docker Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'k8s/**'
      - 'argocd/**'
      - '*.md'
      - '.gitignore'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LC=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and push migrator image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: migrator
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:migrate
          cache-from: type=gha
          platforms: linux/amd64
