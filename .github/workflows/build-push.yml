## ─────────────────────────────────────────────────────────────────────────────
## build-push.yml — Buildea y pushea la imagen a ghcr.io en cada push a main
##
## La imagen resultante será:
##   ghcr.io/matucr/web-viajes:latest
##   ghcr.io/matucr/web-viajes:sha-<commit_short>
##
## Para que k8s pueda pullear la imagen privada, crear el secret manualmente:
##   kubectl create secret docker-registry ghcr-secret \
##     --namespace viaja-con-moni \
##     --docker-server=ghcr.io \
##     --docker-username=MAtucR \
##     --docker-password=<PAT con scope read:packages> \
##     --docker-email=tu@email.com
## ─────────────────────────────────────────────────────────────────────────────
name: Build & Push Docker Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'k8s/**'
      - 'argocd/**'
      - '*.md'
      - '.gitignore'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
