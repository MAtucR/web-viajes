## ─────────────────────────────────────────────────────────────────────────────
## argocd/application.yaml — ArgoCD Application
##
## Prerequisitos en el cluster ANTES de aplicar esto:
##   1. cert-manager instalado:
##        kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
##        kubectl wait --for=condition=available --timeout=120s deployment/cert-manager -n cert-manager
##   2. ClusterIssuer creado:
##        kubectl apply -f prereqs/cluster-issuer.yaml
##
## Aplicar con:
##   kubectl apply -f argocd/application.yaml
## ─────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: web-viajes
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/MAtucR/web-viajes.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: viaja-con-moni

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      ## Sin esta opción, un CRD desconocido (ej: cert-manager no instalado)
      ## aborta todo el sync y ningún recurso se aplica.
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: ""
      kind: Namespace
      jsonPointers:
        - /metadata/labels
        - /metadata/annotations
