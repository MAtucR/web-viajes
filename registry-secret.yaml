## ─────────────────────────────────────────────────────────────────────────────
## k8s/registry-secret.yaml
##
## Secret de tipo docker-registry para que k8s pueda pullear la imagen
## desde GitHub Container Registry (ghcr.io) si el repo es privado.
##
## Si tu imagen es PÚBLICA en ghcr.io, este archivo no es necesario.
##
## ── Cómo generarlo ────────────────────────────────────────────────────────────
## 1. Crear un Personal Access Token (PAT) en GitHub con scope: read:packages
##    https://github.com/settings/tokens
##
## 2. Crear el secret con kubectl:
##
##    kubectl create secret docker-registry ghcr-secret \
##      --namespace viaja-con-moni \
##      --docker-server=ghcr.io \
##      --docker-username=TU_GITHUB_USER \
##      --docker-password=TU_GITHUB_PAT \
##      --docker-email=tu@email.com
##
## 3. O aplicar este YAML reemplazando el campo .dockerconfigjson con el valor
##    generado por:
##
##    kubectl create secret docker-registry ghcr-secret \
##      --docker-server=ghcr.io \
##      --docker-username=TU_GITHUB_USER \
##      --docker-password=TU_GITHUB_PAT \
##      --dry-run=client -o yaml
##
## ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-secret
  namespace: viaja-con-moni
  labels:
    app.kubernetes.io/part-of: viaja-con-moni
type: kubernetes.io/dockerconfigjson
data:
  ## Reemplazar con el valor generado por el comando kubectl de arriba
  .dockerconfigjson: REEMPLAZAR_CON_BASE64_DE_DOCKER_CONFIG
