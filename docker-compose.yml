version: "3.9"

# ─────────────────────────────────────────────
# "Viaja con Moni" — Stack local con Docker Compose
# Uso: docker compose up --build
# ─────────────────────────────────────────────

services:

  # ── PostgreSQL ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vcm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-moni}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecret}
      POSTGRES_DB:       ${POSTGRES_DB:-viajaconmoni}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"          # expuesto solo para Prisma Studio local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-moni} -d ${POSTGRES_DB:-viajaconmoni}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js App ────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner          # apunta al stage final
    container_name: vcm_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:     production
      DATABASE_URL: postgresql://${POSTGRES_USER:-moni}:${POSTGRES_PASSWORD:-supersecret}@postgres:5432/${POSTGRES_DB:-viajaconmoni}?schema=public
      NEXTAUTH_URL: http://localhost:3000        # ajustar si usás NextAuth
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-localdevsecret}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    name: vcm_postgres_data
