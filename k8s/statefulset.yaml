## ─────────────────────────────────────────────────────────────────────────────
## statefulset.yaml — PostgreSQL en k3s
## El Namespace está definido en namespace.yaml
## ─────────────────────────────────────────────────────────────────────────────

## ── PersistentVolumeClaim ────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: viaja-con-moni
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app.kubernetes.io/name:    postgres
    app.kubernetes.io/part-of: viaja-con-moni
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi

---

## ── StatefulSet ──────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: viaja-con-moni
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name:    postgres
    app.kubernetes.io/part-of: viaja-con-moni
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/name:    postgres
        app.kubernetes.io/part-of: viaja-con-moni
    spec:
      terminationGracePeriodSeconds: 60

      ## local-path provisioner crea el directorio como root.
      ## El initContainer hace chown para que postgres (uid 999) pueda escribir.
      ## El pod-level securityContext NO tiene runAsUser para que el initContainer
      ## corra como root y pueda hacer chown.
      securityContext:
        fsGroup: 999

      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 999:999 /var/lib/postgresql/data"]
          volumeMounts:
            - name:      postgres-storage
              mountPath: /var/lib/postgresql/data
          securityContext:
            runAsUser: 0   # root, necesario para chown

      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres

          securityContext:
            runAsUser:  999
            runAsGroup: 999
            allowPrivilegeEscalation: false

          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key:  POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key:  POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key:  POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

          volumeMounts:
            - name:      postgres-storage
              mountPath: /var/lib/postgresql/data

          resources:
            requests:
              cpu:    "250m"
              memory: "256Mi"
            limits:
              cpu:    "1000m"
              memory: "1Gi"

          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U $POSTGRES_USER -d $POSTGRES_DB
            initialDelaySeconds: 30
            periodSeconds:       10
            timeoutSeconds:      5
            failureThreshold:    6

          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U $POSTGRES_USER -d $POSTGRES_DB
            initialDelaySeconds: 5
            periodSeconds:       5
            timeoutSeconds:      3
            failureThreshold:    3

      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc

---

## ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: viaja-con-moni
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name:    postgres
    app.kubernetes.io/part-of: viaja-con-moni
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - name:       postgres
      port:       5432
      targetPort: 5432
      protocol:   TCP
