## registry-secret.yaml
##
## ⚠  Este archivo es una PLANTILLA. No contiene credenciales reales.
##    Crear el secret manualmente en el cluster (NO lo gestiona ArgoCD
##    con valores reales para no exponer credenciales en el repo):
##
##    kubectl create secret docker-registry ghcr-secret \
##      --namespace viaja-con-moni \
##      --docker-server=ghcr.io \
##      --docker-username=MAtucR \
##      --docker-password=<PAT con scope read:packages> \
##      --docker-email=tu@email.com
##
## Si tu imagen es PÚBLICA en ghcr.io, este secret no es necesario
## y podés eliminar el imagePullSecrets del deployment.yaml.
