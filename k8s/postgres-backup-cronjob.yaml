## ─────────────────────────────────────────────────────────────────────────────
## postgres-backup-cronjob.yaml
##
## CronJob que hace pg_dump diario a las 3:00 AM (hora Argentina, UTC-3 → 06:00 UTC)
## y guarda los backups en /var/backups/viaja-con-moni en el nodo.
##
## Se usa hostPath en lugar de un PVC independiente porque local-path tiene
## volumeBindingMode: WaitForFirstConsumer — un PVC sin pod que lo monte queda
## en Pending indefinidamente, lo que ArgoCD interpreta como estado degradado
## y bloquea el sync de toda la aplicación.
##
## ⚠️  IMPORTANTE — single-node k3s:
## Los backups viven en el mismo disco físico que los datos de postgres.
## Si el nodo se rompe, se pierden ambos. Para mayor seguridad, agregá un
## paso al script que copie el backup a un destino externo:
##   - rclone a Google Drive / Backblaze B2 / S3
##   - scp a otro servidor
## ─────────────────────────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: viaja-con-moni
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name:    postgres-backup
    app.kubernetes.io/part-of: viaja-con-moni
spec:
  ## 06:00 UTC = 03:00 hora Argentina
  schedule: "0 6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit:     3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure

          ## Necesario para que el container pueda escribir en el hostPath
          securityContext:
            runAsUser:  999
            runAsGroup: 999
            fsGroup:    999

          initContainers:
            ## Crea el directorio de backups en el nodo con los permisos correctos
            - name: init-backup-dir
              image: busybox:1.36
              command: ["sh", "-c", "mkdir -p /backups && chown 999:999 /backups"]
              securityContext:
                runAsUser: 0
              volumeMounts:
                - name:      backup-storage
                  mountPath: /backups

          containers:
            - name: backup
              image: postgres:16-alpine
              imagePullPolicy: IfNotPresent
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key:  POSTGRES_PASSWORD
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key:  POSTGRES_USER
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key:  POSTGRES_DB
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  OUTFILE="/backups/${POSTGRES_DB}_${TIMESTAMP}.sql.gz"

                  echo "▶ Iniciando backup: $OUTFILE"
                  pg_dump \
                    -h postgres-service \
                    -U "$POSTGRES_USER" \
                    -d "$POSTGRES_DB" \
                    --no-password \
                  | gzip > "$OUTFILE"

                  echo "✅ Backup completado: $(du -sh $OUTFILE | cut -f1)"

                  ## Rotar: conservar solo los últimos 30 archivos
                  ls -t /backups/*.sql.gz | tail -n +31 | xargs -r rm --
                  echo "🗑️  Archivos viejos eliminados. Total: $(ls /backups/*.sql.gz | wc -l)"
              volumeMounts:
                - name:      backup-storage
                  mountPath: /backups

          volumes:
            ## hostPath: sin PVC, sin WaitForFirstConsumer, sin bloqueo de ArgoCD.
            ## El directorio se crea automáticamente por el initContainer de arriba.
            - name: backup-storage
              hostPath:
                path: /var/backups/viaja-con-moni
                type: DirectoryOrCreate
