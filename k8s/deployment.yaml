## ─────────────────────────────────────────────────────────────────────────────
## deployment.yaml — Next.js App en k3s
## ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: viaja-con-moni-app
  namespace: viaja-con-moni
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name:    viaja-con-moni-app
    app.kubernetes.io/part-of: viaja-con-moni
spec:
  replicas: 2
  selector:
    matchLabels:
      app: viaja-con-moni-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: viaja-con-moni-app
        app.kubernetes.io/name:    viaja-con-moni-app
        app.kubernetes.io/part-of: viaja-con-moni
      annotations:
        secret.reloader.stakater.com/reload: "app-secret"
    spec:
      imagePullSecrets:
        - name: ghcr-secret

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["viaja-con-moni-app"]
                topologyKey: kubernetes.io/hostname

      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              until nc -z postgres-service 5432; do
                echo "Esperando a PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL disponible ✅"

        ## FIX: usa la misma imagen que el container principal.
        ## Antes usaba una imagen con tag fijo ':migrate' que podía quedar
        ## desactualizada y correr migraciones de una versión anterior.
        ## Ahora se especifica el tag en el ConfigMap o directamente en CI/CD
        ## con 'kubectl set image', igual que el container principal.
        - name: migrate
          image: ghcr.io/matucr/web-viajes:sha-f8ca994
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
            - |
              echo "▶ Corriendo migraciones..."
              node_modules/.bin/prisma migrate deploy
              echo "✅ Migraciones completadas"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DATABASE_URL

      containers:
        - name: app
          image: ghcr.io/matucr/web-viajes:sha-f8ca994
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http

          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DATABASE_URL
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: NEXTAUTH_SECRET
            ## FIX: NEXTAUTH_URL debe ser https:// en producción.
            ## Con http:// las cookies de sesión (Secure flag) no funcionan
            ## correctamente y NextAuth puede rechazar callbacks.
            ## Actualizá este valor si cambia el dominio.
            - name: NEXTAUTH_URL
              value: "https://viajaconmoni.com"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"

          resources:
            requests:
              cpu:    "200m"
              memory: "256Mi"
            limits:
              cpu:    "1000m"
              memory: "1Gi"

          livenessProbe:
            httpGet:
              path: /api/ping
              port: 3000
            initialDelaySeconds: 20
            periodSeconds:       15
            timeoutSeconds:      3
            failureThreshold:    3

          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds:       10
            timeoutSeconds:      3
            failureThreshold:    3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   false
            runAsNonRoot:             true
            runAsUser:                1001
            capabilities:
              drop: ["ALL"]

---

apiVersion: v1
kind: Service
metadata:
  name: viaja-con-moni-service
  namespace: viaja-con-moni
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name:    viaja-con-moni-app
    app.kubernetes.io/part-of: viaja-con-moni
spec:
  type: ClusterIP
  selector:
    app: viaja-con-moni-app
  ports:
    - name:       http
      port:       80
      targetPort: 3000
      protocol:   TCP
